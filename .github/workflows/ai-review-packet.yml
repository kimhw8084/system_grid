name: AI Review Packet

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base:
        description: "Base SHA/ref"
        required: false
        default: ""
      head:
        description: "Head SHA/ref"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: ai-review-packet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review-packet:
    name: Generate line-level AI review packet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve base/head
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"

            if [[ "$BASE" =~ ^0+$ ]]; then
              BASE="$(git rev-parse "$HEAD~1")"
            fi
          else
            HEAD="${{ inputs.head }}"
            BASE="${{ inputs.base }}"

            if [[ -z "$HEAD" ]]; then
              HEAD="${{ github.sha }}"
            fi

            if [[ -z "$BASE" ]]; then
              BASE="$(git rev-parse "$HEAD~1")"
            fi
          fi

          git fetch --no-tags origin "$BASE" "$HEAD" || true

          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

          echo "BASE=$BASE"
          echo "HEAD=$HEAD"

      - name: Generate full diff packet
        id: packet
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ steps.refs.outputs.base }}"
          HEAD="${{ steps.refs.outputs.head }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${HEAD}"

          mkdir -p ai-review/per-file ai-review/logs ai-review/meta

          echo "$BASE" > ai-review/meta/base.txt
          echo "$HEAD" > ai-review/meta/head.txt
          echo "$REPO" > ai-review/meta/repo.txt
          echo "$RUN_URL" > ai-review/meta/run_url.txt
          echo "$COMMIT_URL" > ai-review/meta/commit_url.txt

          git diff --name-status "$BASE" "$HEAD" > ai-review/CHANGED_FILES.txt || true
          git diff --numstat "$BASE" "$HEAD" > ai-review/NUMSTAT.txt || true
          git diff --stat "$BASE" "$HEAD" > ai-review/DIFF_STAT.txt || true

          git diff \
            --find-renames \
            --find-copies \
            --unified=80 \
            --src-prefix=a/ \
            --dst-prefix=b/ \
            "$BASE" "$HEAD" > ai-review/FULL_DIFF.diff || true

          git format-patch \
            --stdout \
            --find-renames \
            --find-copies \
            "$BASE..$HEAD" > ai-review/FULL_PATCH.patch || true

          nl -ba ai-review/FULL_DIFF.diff > ai-review/FULL_DIFF_NUMBERED.diff || true

          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path("ai-review")
          out = root / "per-file"
          out.mkdir(parents=True, exist_ok=True)

          text = (root / "FULL_DIFF.diff").read_text(errors="replace")
          chunks = []
          cur = []

          for line in text.splitlines(keepends=True):
              if line.startswith("diff --git ") and cur:
                  chunks.append("".join(cur))
                  cur = [line]
              else:
                  cur.append(line)

          if cur:
              chunks.append("".join(cur))

          index = []

          if not chunks or not text.strip():
              (out / "000_NO_DIFF.diff").write_text("No diff found.\n")
          else:
              for i, chunk in enumerate(chunks, start=1):
                  first = chunk.splitlines()[0] if chunk.splitlines() else f"file_{i}"
                  m = re.search(r" b/(.+)$", first)
                  path = m.group(1) if m else f"file_{i}"
                  safe = re.sub(r"[^A-Za-z0-9._-]+", "_", path).strip("_")
                  name = f"{i:03d}_{safe[:140]}.diff"
                  (out / name).write_text(chunk, errors="replace")
                  index.append(f"{i:03d} {path} -> ai-review/per-file/{name}")

          (root / "PER_FILE_INDEX.txt").write_text("\n".join(index) + "\n")
          PY

          {
            echo "# AI Review Packet"
            echo ""
            echo "## Handoff"
            echo ""
            echo '```text'
            echo "Review this commit line by line."
            echo "Repo: $REPO"
            echo "Commit: $COMMIT_URL"
            echo "Full diff: ${COMMIT_URL}.diff"
            echo "Patch: ${COMMIT_URL}.patch"
            echo "Base: $BASE"
            echo "Head: $HEAD"
            echo "Workflow run: $RUN_URL"
            echo ""
            echo "Review requirement:"
            echo "Read every changed file and every diff hunk. Do not judge by changed-file count or summary."
            echo '```'
            echo ""
            echo "## Changed Files"
            echo ""
            echo '```text'
            cat ai-review/CHANGED_FILES.txt
            echo '```'
            echo ""
            echo "## Diff Stat"
            echo ""
            echo '```text'
            cat ai-review/DIFF_STAT.txt
            echo '```'
            echo ""
            echo "## Per-file Diff Index"
            echo ""
            echo '```text'
            cat ai-review/PER_FILE_INDEX.txt
            echo '```'
            echo ""
            echo "## Full Unified Diff"
            echo ""
            echo '```diff'
            cat ai-review/FULL_DIFF.diff
            echo '```'
          } > ai-review/REVIEW_PACKET.md

          echo "changed_count=$(wc -l < ai-review/CHANGED_FILES.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "diff_bytes=$(wc -c < ai-review/FULL_DIFF.diff | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run install/typecheck/build/test/lint if available
        id: checks
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ai-review/logs

          run_log() {
            local name="$1"
            shift
            local log="ai-review/logs/${name}.log"

            echo "COMMAND: $*" | tee "$log"

            set +e
            "$@" 2>&1 | tee -a "$log"
            local status="${PIPESTATUS[0]}"
            set -e

            echo "EXIT_STATUS=$status" | tee -a "$log"
            echo "$status" > "ai-review/logs/${name}.status"
          }

          has_script() {
            node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['$1'] ? 0 : 1)"
          }

          INSTALL="SKIPPED"
          TYPECHECK="SKIPPED"
          BUILD="SKIPPED"
          TEST="SKIPPED"
          LINT="SKIPPED"

          if [[ -f package.json ]]; then
            if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
              run_log install npm ci --no-audit --no-fund
            else
              run_log install npm install --no-audit --no-fund
            fi
            INSTALL="$(cat ai-review/logs/install.status)"

            if has_script typecheck; then
              run_log typecheck npm run typecheck
              TYPECHECK="$(cat ai-review/logs/typecheck.status)"
            fi

            if has_script build; then
              run_log build npm run build
              BUILD="$(cat ai-review/logs/build.status)"
            fi

            if has_script test; then
              run_log test npm test -- --run
              TEST="$(cat ai-review/logs/test.status)"
            fi

            if has_script lint; then
              run_log lint npm run lint
              LINT="$(cat ai-review/logs/lint.status)"
            fi
          fi

          {
            echo ""
            echo "## Check Results"
            echo ""
            echo "| Check | Status |"
            echo "|---|---:|"
            echo "| install | $INSTALL |"
            echo "| typecheck | $TYPECHECK |"
            echo "| build | $BUILD |"
            echo "| test | $TEST |"
            echo "| lint | $LINT |"
            echo ""
            echo "## Check Logs"
            echo ""
            for file in ai-review/logs/*.log; do
              if [[ -f "$file" ]]; then
                echo "### $file"
                echo ""
                echo '```text'
                cat "$file"
                echo '```'
                echo ""
              fi
            done
          } >> ai-review/REVIEW_PACKET.md

          echo "install=$INSTALL" >> "$GITHUB_OUTPUT"
          echo "typecheck=$TYPECHECK" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "test=$TEST" >> "$GITHUB_OUTPUT"
          echo "lint=$LINT" >> "$GITHUB_OUTPUT"

      - name: Create terminal handoff
        shell: bash
        run: |
          set -euo pipefail

          HEAD="${{ steps.refs.outputs.head }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${HEAD}"

          {
            echo "========================================"
            echo "COPY THIS TO CHATGPT:"
            echo "========================================"
            echo "Review this commit line by line:"
            echo "$COMMIT_URL"
            echo ""
            echo "Full diff:"
            echo "${COMMIT_URL}.diff"
            echo ""
            echo "Patch:"
            echo "${COMMIT_URL}.patch"
            echo ""
            echo "Workflow run:"
            echo "$RUN_URL"
            echo ""
            echo "Goal:"
            echo "Run 3 External pass against Monitoring golden standard."
            echo ""
            echo "Use the commit .diff/.patch and AI Review Packet workflow artifact."
            echo "Read every changed file and every diff hunk. Do not judge by summary."
            echo "========================================"
          } | tee ai-review/COPY_TO_CHATGPT.txt

      - name: Compress review packet
        shell: bash
        run: |
          tar -czf ai-review-packet.tar.gz ai-review

      - name: Upload full review packet artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-packet-${{ steps.refs.outputs.head }}
          path: |
            ai-review/
            ai-review-packet.tar.gz
          retention-days: 14

      - name: Fail if build/typecheck failed
        shell: bash
        run: |
          set -euo pipefail

          FAIL=0

          TYPECHECK="${{ steps.checks.outputs.typecheck }}"
          BUILD="${{ steps.checks.outputs.build }}"

          if [[ "$TYPECHECK" != "0" && "$TYPECHECK" != "SKIPPED" ]]; then
            echo "Typecheck failed: $TYPECHECK"
            FAIL=1
          fi

          if [[ "$BUILD" != "0" && "$BUILD" != "SKIPPED" ]]; then
            echo "Build failed: $BUILD"
            FAIL=1
          fi

          exit "$FAIL"
